<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Student Management System</title>
</head>
<body>
    <div class="dashboard-container">
        <h2>🎓 Student Management System</h2>
        
        <form id="student-form" class="form-section">
            <div class="input-group">
                <input type="text" id="student-name" placeholder="Full Name" required>
                <input type="text" id="student-id" placeholder="Student ID" required>
            </div>
            <div class="input-group">
                <input type="email" id="student-email" placeholder="Email Address" required>
                <select id="student-course" required>
                    <option value="" disabled selected>Select Course</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Information Technology">Information Technology</option>
                    <option value="Data Science">Data Science</option>
                    <option value="Cyber Security">Cyber Security</option>
                </select>
            </div>
            <button type="submit" id="add-btn">Add Student</button>
        </form>

        <hr class="divider">

        <div class="table-controls">
            <input type="text" id="search-input" placeholder="Search by name or ID...">
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Course</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="student-table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
